<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ComplianceMap — Global Regulations & Standards Navigator</title>

  <!-- SEO -->
  <meta name="description" content="ComplianceMap: Browse, filter, and visualize global regulations and compliance standards across domains including Data Privacy, Cybersecurity, Finance, Health, and AI Governance." />
  <meta name="keywords" content="compliance, regulations, GDPR, NIS2, HIPAA, ISO 27001, cybersecurity, data privacy, AI Act" />

  <!-- Open Graph -->
  <meta property="og:title" content="ComplianceMap — Global Regulations & Standards Navigator" />
  <meta property="og:description" content="An interactive map and database of global regulations and compliance standards." />
  <meta property="og:type" content="website" />

  <!-- Leaflet CSS (map styles) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

  <!-- Our stylesheets -->
  <link rel="stylesheet" href="./css/main.css" />
  <link rel="stylesheet" href="./css/map.css" />
  <link rel="stylesheet" href="./css/components.css" />
</head>
<body>

  <!-- Vue mount point -->
  <div id="app">
    <!-- Initial loading state shown before Vue takes over -->
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;color:#64748b;font-family:system-ui,sans-serif;">
      <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <span>Loading ComplianceMap…</span>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>

  <!-- ===== CDN Libraries (loaded before our scripts) ===== -->

  <!-- Vue 3 Global Build -->
  <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <!-- Leaflet.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <!-- ===== Our Application Scripts (order matters) ===== -->

  <!-- Data layer -->
  <script src="./js/data-loader.js"></script>

  <!-- Shared components -->
  <script src="./js/components/filter-panel.js"></script>
  <script src="./js/components/reg-card.js"></script>
  <script src="./js/components/std-card.js"></script>
  <script src="./js/components/detail-modal.js"></script>

  <!-- View components -->
  <script src="./js/views/overview.js"></script>
  <script src="./js/views/regulations.js"></script>
  <script src="./js/views/standards.js"></script>
  <script src="./js/views/matrix-view.js"></script>
  <script src="./js/views/news-view.js"></script>
  <script src="./js/views/watchlist-view.js"></script>
  <script src="./js/views/calendar-view.js"></script>
  <script src="./js/views/risk-view.js"></script>
  <script src="./js/components/applicability-wizard.js"></script>
  <script src="./js/components/compare-tray.js"></script>
  <script src="./js/views/gap-analysis-view.js"></script>
  <script src="./js/views/traceability-view.js"></script>
  <script src="./js/views/posture-view.js"></script>
  <script src="./js/views/jurisdiction-view.js"></script>

  <!-- UX help system -->
  <script src="./js/components/help-panel.js"></script>
  <script src="./js/components/onboarding-modal.js"></script>

  <!-- Wave 1 features -->
  <script src="./js/views/copilot-view.js"></script>
  <script src="./js/components/change-alert-banner.js"></script>

  <!-- Wave 2 features -->
  <script src="./js/views/mappings-view.js"></script>
  <script src="./js/views/risk-register-view.js"></script>

  <!-- Wave 3 features -->
  <script src="./js/views/vendor-risk-view.js"></script>
  <script src="./js/views/audit-view.js"></script>

  <!-- Wave 5 features -->
  <script src="./js/views/req-search-view.js"></script>

  <!-- App root (creates Vue app, must be last) -->
  <script src="./js/app.js"></script>

</body>
</html>
