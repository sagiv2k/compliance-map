name: Enrich Regulation Requirements

on:
  workflow_dispatch:   # manual trigger only — run once to populate all guidance

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Enrich requirements with AI guidance
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/enrich_requirements.py

      - name: Commit enriched regulations
        run: |
          git config user.name  "ComplianceMap Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/regulations.json
          git diff --staged --quiet || git commit -m "data: enrich requirements with compliance guidance $(date +%Y-%m-%d)"
          git pull --rebase origin master
          git push
