name: Update Regulatory News

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC daily
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Fetch news feeds
        run: python scripts/fetch_news.py

      - name: Commit if news changed
        run: |
          git config user.name  "ComplianceMap Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "data: daily news update $(date +%Y-%m-%d)"
          git push
