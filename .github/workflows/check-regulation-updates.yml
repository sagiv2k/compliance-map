name: Monthly Regulation Update Check

on:
  schedule:
    - cron: '0 8 1 * *'   # 8 AM UTC on the 1st of every month
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run regulation update check
        run: python scripts/check_regulation_updates.py

      - name: Commit results if changed
        run: |
          git config user.name  "ComplianceMap Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/regulation-hashes.json data/versions/ CHANGELOG.md
          git diff --staged --quiet || git commit -m "data: monthly regulation check $(date +%Y-%m)"
          git pull --rebase origin master
          git push
